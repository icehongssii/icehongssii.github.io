    <!-- 프리즘 하이라이팅이 obsidian admonition에 영향받지않게
        language-ad로 생성되는 클래스 삭제하는 스크립트
    -->
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        // Select all 'pre' and 'code' elements
        const elements = document.querySelectorAll("pre, code");

        // Iterate over each element
        elements.forEach((element) => {
          // Iterate over each class in the class list
          element.classList.forEach((cls) => {
            // Check if the class starts with 'language-ad'
            if (cls.startsWith("language-ad")) {
              // Remove the class
              element.classList.remove(cls);
            }
          });
        });
      });
    </script>
